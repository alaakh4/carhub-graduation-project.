<div class="auth-page reset-password-page">
  <main class="auth-main">
    <div class="container">
      <div class="auth-card-header">
        <h2>Create New Password</h2>
        <p>Please enter a secure new password for your account</p>
      </div>
      <div class="auth-card">

        <form class="auth-form" data-bind="submit: submitResetPassword">
          <div class="form-group">
            <label for="newPassword">New Password</label>
            <input id="newPassword" type="password" class="auth-input" placeholder="Enter new password"
              data-bind="value: newPassword" required />
          </div>

          <div class="form-group">
            <label for="confirmPassword">Confirm Password</label>
            <input id="confirmPassword" type="password" class="auth-input" placeholder="Confirm new password"
              data-bind="value: confirmPassword" required />
          </div>

          <oj-bind-if test="[[errorMessage()]]">
            <div class="auth-message error">
              <i class="fas fa-circle-exclamation"></i>
              <span data-bind="text: errorMessage"></span>
            </div>
          </oj-bind-if>

          <oj-bind-if test="[[successMessage()]]">
            <div class="auth-message success">
              <i class="fas fa-circle-check"></i>
              <span data-bind="text: successMessage"></span>
            </div>
          </oj-bind-if>

          <button type="submit" class="auth-submit-btn" data-bind="disable: isSubmitting">
            <i class="fas fa-key"></i>
            <span data-bind="text: isSubmitting() ? 'Updating...' : 'Reset Password'"></span>
          </button>
        </form>

      </div>
    </div>
  </main>
</div>
