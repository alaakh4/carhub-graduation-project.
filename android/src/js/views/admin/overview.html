<div class="admindash-page">
  <div class="admindash-cards">
    <div class="admindash-card">
      <div class="admindash-card-icon"><i class="fas fa-clock"></i></div>
      <div class="admindash-card-body">
        <span class="admindash-card-label">Pending Shops</span>
        <strong data-bind="text: pendingCount"></strong>
      </div>
    </div>

    <div class="admindash-card">
      <div class="admindash-card-icon"><i class="fas fa-check-circle"></i></div>
      <div class="admindash-card-body">
        <span class="admindash-card-label">Active Shops</span>
        <strong data-bind="text: activeCount"></strong>
      </div>
    </div>

    <div class="admindash-card">
      <div class="admindash-card-icon"><i class="fas fa-ban"></i></div>
      <div class="admindash-card-body">
        <span class="admindash-card-label">Deactivated Shops</span>
        <strong data-bind="text: deactivatedCount"></strong>
      </div>
    </div>

    <div class="admindash-card">
      <div class="admindash-card-icon"><i class="fas fa-store"></i></div>
      <div class="admindash-card-body">
        <span class="admindash-card-label">Total Shops</span>
        <strong data-bind="text: totalCount"></strong>
      </div>
    </div>
  </div>

  <div class="admindash-panel">
    <div class="admindash-panel-head">
      <h3>Recent Pending Shops</h3>
    </div>

    <div class="admindash-table-wrap">
      <table class="admindash-table">
        <thead>
          <tr>
            <th>ID</th>
            <th>Shop Name</th>
            <th>Email</th>
            <th>Phone</th>
            <th>City</th>
            <th>Date</th>
          </tr>
        </thead>
        <tbody data-bind="foreach: recentPending">
          <tr>
            <td data-bind="text: '#' + id"></td>
            <td data-bind="text: name || '-'"></td>
            <td data-bind="text: email || '-'"></td>
            <td data-bind="text: phone || '-'"></td>
            <td data-bind="text: city || '-'"></td>
            <td data-bind="text: created_at || '-'"></td>
          </tr>
        </tbody>
      </table>
    </div>

    <div class="admindash-empty" data-bind="visible: !loading() && recentPending().length === 0">
      No pending shops found.
    </div>
  </div>
</div>
