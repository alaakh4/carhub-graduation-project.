<div class="admindash-page">
  <div class="admindash-panel">
    <div class="admindash-panel-head">
      <h3>Admin Profile</h3>
    </div>

    <div class="admindash-profile-card">
      <div class="admindash-profile-icon">
        <i class="fas fa-user-shield"></i>
      </div>

      <div class="admindash-profile-info">
        <div class="admindash-profile-row">
          <span class="label">Name</span>
          <strong data-bind="text: admin.name"></strong>
        </div>

        <div class="admindash-profile-row">
          <span class="label">Email</span>
          <strong data-bind="text: admin.email"></strong>
        </div>

        <div class="admindash-profile-row">
          <span class="label">Role</span>
          <strong>Website Manager</strong>
        </div>
      </div>
    </div>
  </div>
</div>
