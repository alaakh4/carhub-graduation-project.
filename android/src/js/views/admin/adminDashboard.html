<div class="admindash-app">
  <div class="admindash-shell">
    <aside class="admindash-sidebar">
      <div class="admindash-sidebar-inner">
        <div class="admindash-brand">
          <div class="admindash-brand-icon">
            <i class="fas fa-user-shield"></i>
          </div>
          <div>
            <h2 style="color: white;">Admin Panel</h2>
            <p>CarHub Manager</p>
          </div>
        </div>

        <nav class="admindash-nav">
          <a href="#"
             class="admindash-nav-link"
             data-bind="css:{active: currentPage()==='overview'}, click: function(){ goPage('overview'); }">
            <i class="fas fa-chart-line"></i>
            <span>Overview</span>
          </a>

          <a href="#"
             class="admindash-nav-link"
             data-bind="css:{active: currentPage()==='shops'}, click: function(){ goPage('shops'); }">
            <i class="fas fa-store"></i>
            <span>Shops</span>
          </a>

          <a href="#"
             class="admindash-nav-link"
             data-bind="css:{active: currentPage()==='profile'}, click: function(){ goPage('profile'); }">
            <i class="fas fa-user-circle"></i>
            <span>Profile</span>
          </a>
        </nav>

        <div class="admindash-sidebar-bottom">
          <button class="admindash-logout-btn" type="button" data-bind="click: logout">
            <span class="admindash-logout-icon">
              <i class="fas fa-right-from-bracket"></i>
            </span>
            <span>Logout</span>
          </button>
        </div>
      </div>
    </aside>

    <main class="admindash-main">
      <header class="admindash-topbar">
        <div>
          <h1 data-bind="text: pageTitle"></h1>
          <p data-bind="text: pageSubtitle"></p>
        </div>

        <div class="admindash-userbox">
          <div class="admindash-user-avatar">
            <i class="fas fa-user-shield"></i>
          </div>
          <div>
            <div class="admindash-user-name" data-bind="text: adminName"></div>
            <div class="admindash-user-role">Website Manager</div>
          </div>
        </div>
      </header>

      <section class="admindash-content">
        <oj-module config="[[moduleConfig]]"></oj-module>
      </section>
    </main>
  </div>
</div>
