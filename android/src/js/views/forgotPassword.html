<div class="auth-page forgot-password-page">


  <main class="auth-main">
    <div class="container">
        <div class="auth-card-header">
          <h2>Reset Your Password</h2>
          <p>We will send a secure reset link to your client email.</p>
        </div>
      <div class="auth-card">
        <div class="auth-chip">
          <i class="fas fa-lock"></i>
          <span>Client Recovery</span>
        </div>
        <form class="auth-form" data-bind="submit: submitForgotPassword">
          <div class="form-group">
            <label for="forgotEmail">Email Address</label>
            <input id="forgotEmail"
                   type="email"
                   class="auth-input"
                   placeholder="Enter your email"
                   data-bind="value: email"
                   required />
          </div>

          <oj-bind-if test="[[errorMessage()]]">
            <div class="auth-message error">
              <i class="fas fa-circle-exclamation"></i>
              <span data-bind="text: errorMessage"></span>
            </div>
          </oj-bind-if>

          <oj-bind-if test="[[successMessage()]]">
            <div class="auth-message success">
              <i class="fas fa-circle-check"></i>
              <span data-bind="text: successMessage"></span>
            </div>
          </oj-bind-if>

          <button type="submit" class="auth-submit-btn" data-bind="disable: isSubmitting">
            <i class="fas fa-paper-plane"></i>
            <span data-bind="text: isSubmitting() ? 'Sending...' : 'Send Reset Link'"></span>
          </button>
        </form>

        <div class="auth-footer-links">
          <a href="#" onclick="router.go({path:'login'}); return false;">Back to Login</a>
        </div>
      </div>
    </div>
  </main>
</div>
